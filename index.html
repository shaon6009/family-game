      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1f2937, #111827);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 800px;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      color: #facc15;
    }

    p {
      color: #d1d5db;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      color: #111827;
      border-radius: 24px;
      padding: 40px 20px;
      min-height: 320px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .category {
      position: absolute;
      top: 15px;
      right: 15px;
      background: #111827;
      color: white;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
    }

    .word {
      font-size: 2rem;
      font-weight: bold;
      margin: 20px 0;
      color: #111827;
    }

    .hidden {
      filter: blur(12px);
      user-select: none;
    }

    .controls {
      margin-top: 25px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    button {
      padding: 12px 22px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
    }

    .next-btn {
      background: #22c55e;
      color: white;
    }

    .reveal-btn {
      background: #3b82f6;
      color: white;
    }

    .shuffle-btn {
      background: #f59e0b;
      color: white;
    }

    .stats {
      margin-top: 20px;
      color: #d1d5db;
      font-size: 15px;
    }

    @media (max-width: 600px) {
      .word {
        font-size: 1.5rem;
      }

      h1 {
        font-size: 2rem;
      }

      .card {
        padding: 30px 15px;
      }
    }

    }

    }

      currentCard = 0;
      loadCard(currentCard);
    }
