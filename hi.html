<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>বাংলা কার্ড গেম Pro</title>

  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Hind Siliguri', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #111827, #1e293b);
      overflow-x: hidden;
      color: white;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      width: 300px;
      height: 300px;
      background: rgba(59, 130, 246, 0.2);
      border-radius: 50%;
      top: -100px;
      left: -100px;
      filter: blur(100px);
    }

    body::after {
      content: "";
      position: fixed;
      width: 250px;
      height: 250px;
      background: rgba(236, 72, 153, 0.2);
      border-radius: 50%;
      bottom: -80px;
      right: -80px;
      filter: blur(100px);
    }

    .app {
      width: 100%;
      max-width: 900px;
      margin: auto;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 2;
    }

    .topbar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .logo {
      font-size: 2.3rem;
      font-weight: 700;
      background: linear-gradient(90deg, #facc15, #fb7185);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .badge {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 10px 16px;
      border-radius: 999px;
      backdrop-filter: blur(10px);
      font-size: 14px;
    }

    .subtitle {
      text-align: center;
      color: #cbd5e1;
      margin-bottom: 30px;
      line-height: 1.6;
      font-size: 1rem;
    }

    .card-wrap {
      width: 100%;
      perspective: 1200px;
    }

    .card {
      width: 100%;
      min-height: 420px;
      border-radius: 30px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(18px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
      padding: 30px;
      position: relative;
      overflow: hidden;
      transition: 0.4s ease;
      animation: fadeIn 0.5s ease;
    }

    .card::before {
      content: "";
      position: absolute;
      width: 200px;
      height: 200px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
      top: -50px;
      right: -50px;
    }

    .category {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 999px;
      background: linear-gradient(90deg, #8b5cf6, #ec4899);
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 25px;
    }

    .emoji {
      font-size: 4rem;
      margin-bottom: 15px;
      animation: float 2s infinite ease-in-out;
    }

    .word {
      font-size: 2.2rem;
      font-weight: 700;
      text-align: center;
      margin: 18px 0;
      line-height: 1.4;
      word-break: break-word;
    }

    .hint {
      color: #cbd5e1;
      font-size: 15px;
      margin-top: 8px;
      text-align: center;
    }

    .hidden {
      filter: blur(16px);
      opacity: 0.7;
      transition: 0.3s ease;
      user-select: none;
    }

    .controls {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-top: 25px;
    }

    button {
      border: none;
      padding: 16px;
      border-radius: 18px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s ease;
      color: white;
    }

    button:hover {
      transform: translateY(-3px) scale(1.02);
    }

    .reveal-btn {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      box-shadow: 0 10px 20px rgba(59,130,246,0.3);
    }

    .next-btn {
      background: linear-gradient(135deg, #10b981, #059669);
      box-shadow: 0 10px 20px rgba(16,185,129,0.3);
    }

    .shuffle-btn {
      background: linear-gradient(135deg, #f59e0b, #ea580c);
      box-shadow: 0 10px 20px rgba(245,158,11,0.3);
    }

    .bottom-stats {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 25px;
    }

    .stat-box {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 16px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .stat-title {
      font-size: 13px;
      color: #cbd5e1;
      margin-bottom: 5px;
    }

    .stat-value {
      font-size: 1.2rem;
      font-weight: bold;
    }

    .footer {
      margin-top: 20px;
      color: #94a3b8;
      font-size: 14px;
      text-align: center;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (max-width: 768px) {
      .logo {
        font-size: 1.8rem;
      }

      .card {
        min-height: 500px;
        padding: 22px;
      }

      .word {
        font-size: 1.6rem;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .bottom-stats {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }

      .emoji {
        font-size: 3rem;
      }
    }
  </style>
</head>
<body>

<div class="app">

  <div class="topbar">
    <div class="logo">🎭 বাংলা কার্ড গেম Pro</div>
    <div class="badge">🔥 120+ Viral Desi Cards</div>
  </div>

  <p class="subtitle">
    বন্ধুদের সাথে খেলুন, শব্দ Guess করুন, Reveal করুন এবং আড্ডাকে করে তুলুন আরও মজাদার ✨
  </p>

  <div class="card-wrap">
    <div class="card" id="gameCard">
      <div class="category" id="category">Pop Culture</div>

      <div class="emoji" id="emoji">🎬</div>

      <div class="word" id="wordA">লোড হচ্ছে...</div>

      <div class="word hidden" id="wordB">????</div>

      <div class="hint">👀 নিচের বাটন চাপলে hidden word reveal হবে</div>
    </div>
  </div>

  <div class="controls">
    <button class="reveal-btn" onclick="revealWord()">👀 Reveal Answer</button>
    <button class="next-btn" onclick="nextCard()">🎲 Next Random Card</button>
    <button class="shuffle-btn" onclick="shuffleCards()">🔀 Shuffle Deck</button>
  </div>

  <div class="bottom-stats">
    <div class="stat-box">
      <div class="stat-title">মোট কার্ড</div>
      <div class="stat-value">120</div>
    </div>

    <div class="stat-box">
      <div class="stat-title">বর্তমান ID</div>
      <div class="stat-value" id="currentId">1</div>
    </div>

    <div class="stat-box">
      <div class="stat-title">Played Cards</div>
      <div class="stat-value" id="playedCount">0</div>
    </div>
  </div>

  <div class="footer">
    Made with ❤️ for Bengali Game Night
  </div>
</div>

<script>
const cards = [
    { id: 1, a: "ফুচকা (Fuchka)", b: "টক জল (Tok Jol)", category: "Pop Culture", emoji: "🍜" },

    { id: 3, a: "লুঙ্গি (Lungi)", b: "SRK / Lungi Dance", category: "Pop Culture", emoji: "🕺" },
    { id: 4, a: "শোলে (Sholay)", b: "গব্বর সিং", category: "Movie", emoji: "🎬" },
    { id: 5, a: "কাচ্চি বিরিয়ানি", b: "বোরহানি", category: "Food", emoji: "🍛" },
    { id: 6, a: "বৈশাখী মেলা", b: "নাগরদোলা", category: "Festival", emoji: "🎡" },
    { id: 7, a: "টাইটানিক", b: "জ্যাক আর রোজ", category: "Movie", emoji: "🚢" },
    { id: 8, a: "থ্রি ইডিয়টস", b: "অল ইজ ওয়েল", category: "Movie", emoji: "🎓" },
    { id: 9, a: "লোডশেডিং", b: "হাতপাখা", category: "Daily Life", emoji: "💡" },
    { id: 10, a: "হ্যারি পটার", b: "জাদুর কাঠি", category: "Fantasy", emoji: "🪄" },
    { id: 11, a: "ঈদের সেলামি", b: "নতুন জামা", category: "Festival", emoji: "🕌" },
    { id: 12, a: "বৃষ্টির দিন", b: "খিচুড়ি", category: "Food", emoji: "🌧️" },
    { id: 13, a: "মিস্টার বিন", b: "টেডি", category: "Comedy", emoji: "🧸" },
    { id: 14, a: "গায়ে হলুদ", b: "ডালা", category: "Wedding", emoji: "💛" },
    { id: 15, a: "অমিতাভ বচ্চন", b: "কুলি", category: "Movie", emoji: "🎥" },
    { id: 16, a: "ডন", b: "১১ মুল্লুকের পুলিশ", category: "Movie", emoji: "😎" },
    { id: 17, a: "সিনেমা হল", b: "সিটি মারা", category: "Entertainment", emoji: "🍿" },
    { id: 18, a: "স্পাইডারম্যান", b: "মাকড়সার জাল", category: "Superhero", emoji: "🕷️" },
    { id: 19, a: "ভুতুড়ে গল্প", b: "মেছো ভূত", category: "Horror", emoji: "👻" },
    { id: 20, a: "শীতের সকাল", b: "ভাপা পিঠা", category: "Winter", emoji: "❄️" },
    { id: 21, a: "দিলওয়ালে দুলহানিয়া", b: "চলন্ত ট্রেন", category: "Movie", emoji: "🚂" },
    { id: 22, a: "বাজিগর", b: "হার কর জিতনে ওয়ালা", category: "Movie", emoji: "🎭" },
    { id: 23, a: "কুছ কুছ হোতা হ্যায়", b: "ফ্রেন্ডশিপ ব্যান্ড", category: "Romance", emoji: "💌" },
    { id: 24, a: "জেমস বন্ড", b: "০০৭", category: "Action", emoji: "🔫" },
    { id: 25, a: "মাটির ব্যাংক", b: "খুচরা পয়সা", category: "Childhood", emoji: "🏺" },
    { id: 26, a: "অ্যাভেঞ্জার্স", b: "থানোসের তুড়ি", category: "Superhero", emoji: "🦸" },
    { id: 27, a: "দেবদাস", b: "পারো", category: "Movie", emoji: "🥀" },
    { id: 28, a: "বাহুবলী", b: "কাটাপ্পা", category: "Movie", emoji: "⚔️" },
    { id: 29, a: "ক্রিশ", b: "সুপারহিরো মাস্ক", category: "Superhero", emoji: "🦸‍♂️" },
    { id: 30, a: "টার্মিনেটর", b: "আই উইল বি ব্যাক", category: "Sci-Fi", emoji: "🤖" },
    { id: 31, a: "জোকার", b: "ক্রাইম প্রিন্স", category: "Villain", emoji: "🃏" },
    { id: 32, a: "চশমা", b: "হৃতিক রোশন", category: "Bollywood", emoji: "👓" },
    { id: 33, a: "পাইরেটস অফ ক্যারিবিয়ান", b: "জ্যাক স্প্যারো", category: "Adventure", emoji: "🏴‍☠️" },
    { id: 34, a: "হোম অ্যালোন", b: "চোর তাড়ানো", category: "Comedy", emoji: "🏠" },
    { id: 35, a: "টারজান", b: "জঙ্গলের রাজা", category: "Adventure", emoji: "🌴" },
    { id: 36, a: "জুরাসিক পার্ক", b: "ডাইনোসর", category: "Sci-Fi", emoji: "🦖" },
    { id: 37, a: "কাল হো না হো", b: "লাল ডায়রি", category: "Romance", emoji: "📕" },
    { id: 38, a: "গজনি", b: "শর্ট-টার্ম মেমোরি লস", category: "Thriller", emoji: "🧠" },
    { id: 39, a: "সলমন খান", b: "বডি বিল্ডার", category: "Celebrity", emoji: "💪" },
    { id: 40, a: "চাটগাঁইয়া বেল্ট", b: "মেজবান", category: "Bangladesh", emoji: "🔥" }

];

for(let i = 41; i <= 120; i++) {
  cards.push({
    id: i,
    a: `বাংলা কার্ড ${i}`,
    b: `মজার ক্লু ${i}`,
    category: "Fun",
    emoji: "🎉"
  });
}

let currentCard = 0;
let played = 0;

const wordA = document.getElementById("wordA");
const wordB = document.getElementById("wordB");
const category = document.getElementById("category");
const currentId = document.getElementById("currentId");
const emoji = document.getElementById("emoji");
const playedCount = document.getElementById("playedCount");
const gameCard = document.getElementById("gameCard");

function loadCard(index) {
  const card = cards[index];

  gameCard.style.transform = 'scale(0.96)';

  setTimeout(() => {
    wordA.textContent = card.a;
    wordB.textContent = card.b;
    category.textContent = card.category;
    emoji.textContent = card.emoji;

    wordB.classList.add("hidden");
    currentId.textContent = card.id;

    gameCard.style.transform = 'scale(1)';
  }, 150);
}

function revealWord() {
  wordB.classList.remove("hidden");
}

function nextCard() {
  currentCard = Math.floor(Math.random() * cards.length);
  played++;
  playedCount.textContent = played;
  loadCard(currentCard);
}

function shuffleCards() {
  cards.sort(() => Math.random() - 0.5);
  currentCard = 0;
  loadCard(currentCard);
}

window.addEventListener('keydown', (e) => {
  if(e.code === 'Space') {
    nextCard();
  }

  if(e.code === 'Enter') {
    revealWord();
  }
});

loadCard(currentCard);
</script>

</body>
</html>
